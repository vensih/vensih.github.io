<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vensi Hajdari · Graphic Designer & Creative Engineer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script>
    (function () {
      try {
        var t = localStorage.getItem("site-theme") || "dark";
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) { document.documentElement.setAttribute("data-theme", "dark"); }
    })();
  </script>
</head>
<body>
  <div class="bg-atmos"></div>
  <div class="bg-grain"></div>
  <div class="cursor-glow" id="cursor-glow"></div>

  <div id="root"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- web component for user-fillable images -->
  <script src="js/global/image-slot.js"></script>

  <!-- app -->
  <script type="text/babel" src="js/global/tweaks-panel.jsx"></script>
  <script type="text/babel" src="js/home/lib.jsx"></script>
  <script type="text/babel" src="js/home/sections.jsx"></script>
  <script type="text/babel" src="js/home/app.jsx"></script>

  <!-- cursor-follow glow -->
  <script>
    (function () {
      const g = document.getElementById("cursor-glow");
      let raf;
      window.addEventListener("pointermove", (e) => {
        if (raf) return;
        raf = requestAnimationFrame(() => {
          g.style.left = e.clientX + "px";
          g.style.top = e.clientY + "px";
          g.style.opacity = "1";
          raf = null;
        });
      });
      window.addEventListener("pointerleave", () => { g.style.opacity = "0"; });
    })();
  </script>
</body>
</html>
